<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — VidSell</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

<nav class="nav scrolled">
  <div class="nav-inner">
    <a href="../index.html" class="logo">VidSell<span class="logo-dot">●</span></a>
    <div class="nav-right">
      <div class="lang-switcher">
        <button class="lang-btn active" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="fa">FA</button>
        <button class="lang-btn" data-lang="ar">AR</button>
        <button class="lang-btn" data-lang="ja">JA</button>
        <button class="lang-btn" data-lang="tr">TR</button>
      </div>
    </div>
  </div>
</nav>

<main class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><a href="../index.html" class="logo">VidSell<span class="logo-dot">●</span></a></div>
    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-sub">Sign in to your creator account.</p>

    <div class="form-error" id="err"></div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="password" placeholder="Your password" autocomplete="current-password"/>
    </div>

    <button class="form-btn" id="loginBtn" onclick="handleLogin()">Login</button>
    <div class="auth-footer">Don't have an account? <a href="register.html">Sign up</a></div>
  </div>
</main>

<script src="../js/i18n.js"></script>
<script src="../js/db.js"></script>
<script>
async function handleLogin() {
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('err');
  err.classList.remove('show');

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!email || !password) {
    err.textContent = 'Please fill in all fields.';
    err.classList.add('show');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Logging in...';

  try {
    await loginUser({ email, password });
    window.location.href = 'dashboard.html';
  } catch (e) {
    err.textContent = e.message;
    err.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Login';
  }
}
document.querySelectorAll('.form-input').forEach(inp => {
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
});
</script>
</body>
</html>
